name: morning-update   # 朝刊テック: 毎朝の自動更新（取得→分類→スナップショット→Pages再デプロイ）

on:
  schedule:
    # ┌──────────────────────────────────────────────────────────────────┐
    # │ ★通知の時刻をここで変えられます★  下の "cron:" の値を書き換えるだけ。  │
    # └──────────────────────────────────────────────────────────────────┘
    #
    # 書き方:  "分 時 * * *"   ← 時刻は UTC（世界標準時）で書く。日本時間(JST)から9を引く。
    #
    #  ┌── 通知したいJST時刻 ──┬── cron に書く値 ──┐
    #  │   6:00              │  "0 21 * * *"     │
    #  │   6:47（現在）       │  "47 21 * * *"    │
    #  │   7:00              │  "0 22 * * *"     │
    #  │   7:30              │  "30 22 * * *"    │
    #  │   8:00              │  "0 23 * * *"     │
    #  │   9:00              │  "0 0  * * *"     │
    #  │  12:00（昼）        │  "0 3  * * *"     │
    #  │  21:00（夜）        │  "0 12 * * *"     │
    #  └─────────────────────┴───────────────────┘
    #  計算式: UTCの時 = (JSTの時 - 9 + 24) ÷ 24 の余り。 分はJSTと同じ。
    #
    # 1日に複数回 通知したいときは "- cron:" の行を増やすだけ（新着がある時だけ届く）:
    #     - cron: "0 22 * * *"   # 朝7:00 JST
    #     - cron: "0 3  * * *"   # 昼12:00 JST
    #     - cron: "0 9  * * *"   # 夕18:00 JST
    #
    # 注意: GitHub の自動実行は時刻ぴったりを保証せず、混雑時は数分〜数十分遅れます
    #       （GitHub側の仕様。確実に即時で試したいときは下の "Run workflow" を使う）。
    - cron: "47 21 * * *"   # ← 現在: 6:47 JST
  workflow_dispatch: {}   # 手動実行も可能にする（Actions画面の "Run workflow"）

permissions:
  contents: write   # 生成物(articles.db / web/data/*.json)を push し直すため
  actions: write    # 更新後に deploy-pages ワークフローを起動するため

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: 取得→分類→スナップショット生成→通知
        env:
          # Discord通知用。GitHubの Settings > Secrets and variables > Actions に
          # DISCORD_WEBHOOK_URL を登録すると、ここで環境変数として渡る。
          # 未登録なら通知はスキップされる（更新自体は止まらない）。
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python update.py

      - name: 変更があればコミットして保存
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles.db web/data
          if git diff --cached --quiet; then
            echo "更新なし（新着記事なし）。コミットしません。"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: 毎朝の自動更新 ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # 重要: GITHUB_TOKEN での push は、GitHubの仕様（無限ループ防止）により
      # 他のワークフロー（deploy-pages の on: push）を「起動しない」。
      # そのため、ここから workflow_dispatch で deploy-pages を明示的に起動する
      # （workflow_dispatch / repository_dispatch はこの制限の例外として起動できる）。
      - name: Pages を再デプロイ（サイトに今朝のデータを反映）
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main
