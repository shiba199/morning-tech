name: morning-update   # 朝刊テック: 毎朝の自動更新（取得→分類→スナップショット）

on:
  schedule:
    # cron は UTC。7:00 JST = 前日 22:00 UTC。
    # GitHub Actions の cron は混雑時に数分〜数十分遅れることがある（仕様上の制約）。
    - cron: "0 22 * * *"
  workflow_dispatch: {}   # 手動実行も可能にする（Actions画面の "Run workflow"）

# 生成物(articles.db / web/data/*.json)をリポジトリに push し直すための書き込み権限
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: 取得→分類→スナップショット生成→通知
        env:
          # Discord通知用。GitHubの Settings > Secrets and variables > Actions に
          # DISCORD_WEBHOOK_URL を登録すると、ここで環境変数として渡る。
          # 未登録なら通知はスキップされる（更新自体は止まらない）。
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python update.py

      - name: 変更があればコミットして保存
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles.db web/data
          if git diff --cached --quiet; then
            echo "更新なし（新着記事なし）。コミットしません。"
          else
            git commit -m "chore: 毎朝の自動更新 ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
