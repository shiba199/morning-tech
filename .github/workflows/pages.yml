name: deploy-pages   # 朝刊テック: web/ を GitHub Pages に公開（PWA配信）

# main への push（毎朝の自動更新コミットを含む）と手動実行で再デプロイする
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# GitHub Pages デプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイは1つに（古い実行はキャンセル）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pages 設定
        uses: actions/configure-pages@v5

      - name: web/ をアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: web   # フロント一式（index.html / manifest.json / sw.js / icons / data）

      - name: デプロイ
        id: deployment
        uses: actions/deploy-pages@v4
